{% extends 'home.html' %}
{% block title %}
{{ department.name }} - Warka Solutions
{% endblock %}

{% load static %}
{% block content %}
<main class="main">
  <style>
    .justify-text {
      text-align: justify;
      margin-bottom: 1rem;
      line-height: 1.6;
    }
  </style>

  <!-- Page Title -->
  <div class="page-title" data-aos="fade">
    <div class="heading">
      <div class="container">
        <div class="row d-flex justify">
          <div class="col-lg-12">
            <h1 class="justify-text" style="font-weight: bold;">{{ department.name }}</h1>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Department Content -->
  <section id="department" class="section department">
    <div class="container">
      <div class="row gy-4">
        <div class="col-lg-8" data-aos="fade-up" data-aos-delay="100">
          {% if department.image %}
          <img src="{{ department.image.url }}" alt="{{ department.name }}" class="img-fluid">
          {% endif %}
        </div>
        <div class="row d-flex justify">
          <p class="justify-text">{{ department.description }}</p>
        </div>
      </div>
    </div>
  </section>
</main>
{% endblock %}
